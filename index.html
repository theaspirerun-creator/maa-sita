<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }
    video {
      max-width: 100%;
      max-height: 100vh;
    }
    #tap-msg {
      color: white;
      font-size: 22px;
      font-family: Arial, sans-serif;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="tap-msg">🔊 Tap anywhere to play with Sound</div>

  <video 
    id="myvideo"
    src="maa-sita-video.mp4"
    loop
    playsinline
    controls
    style="width:100%; max-width:900px;"
  ></video>

  <script>
    const video = document.getElementById('myvideo');
    const msg = document.getElementById('tap-msg');

    msg.addEventListener('click', () => {
      msg.style.display = 'none';
      video.muted = false;
      video.play();
    });
  </script>

</body>
</html>
